apiVersion: charts.kubealex.com/v1
kind: K8SMediaserver
metadata:
  name: k8smediaserver-sample
spec:
  general:
    ingress_host: k8s-mediaserver.k8s.test
    plex_ingress_host: k8s-plex.k8s.test
    image_tag: latest
    podDistribution: spread
    puid: 1000
    pgid: 1000
    storage:
      customVolume: false
      accessMode: "ReadWriteMany"
      pvcName: "arr-configuration-pvc"
      size: 50Gi
      pvcStorageClass: "samba-nas"
      subPaths:
        tv: media/tv
        movies: media/movies
        downloads: downloads
        transmission: transmission
        sabnzbd: sabnzbd
        config: config
        disorganized: "disorganized-media"
      volumes: {}
    ingress:
      ingressClassName: ""
    nodeSelector: {}

  sonarr:
    enabled: true
    container:
      image: docker.io/linuxserver/sonarr
      nodeSelector: {}
      port: 8989
    service:
      type: ClusterIP
      port: 8989
      nodePort:
      extraLBService: false
      extraLBAnnotations: {}
    ingress:
      enabled: true
      annotations: {}
      path: /sonarr
      tls:
        enabled: false
        secretName: ""
    resources: {}
    volume: {}
      # pvcName: arr-configuration-pvc

  radarr:
    enabled: true
    container:
      image: docker.io/linuxserver/radarr
      nodeSelector: {}
      port: 7878
    service:
      type: ClusterIP
      port: 7878
      nodePort:
      extraLBService: false
      extraLBAnnotations: {}
    ingress:
      enabled: true
      annotations: {}
      path: /radarr
      tls:
        enabled: false
        secretName: ""
    resources: {}
    volume: {}

  jackett:
    enabled: false

  transmission:
    enabled: true
    container:
      image: docker.io/linuxserver/transmission
      nodeSelector: {}
      port:
        utp: 9091
        peer: 51413
    service:
      utp:
        type: ClusterIP
        port: 9091
        nodePort:
        extraLBService: false
        extraLBAnnotations: {}
      peer:
        type: ClusterIP
        port: 51413
        nodePort:
        nodePortUDP:
        extraLBService: false
        extraLBAnnotations: {}
    ingress:
      enabled: true
      annotations: {}
      path: /transmission
      tls:
        enabled: false
        secretName: ""
    config:
      auth:
        enabled: false
        username: ""
        password: ""
    resources: {}
    volume: {}

  sabnzbd:
    enabled: true
    container:
      image: docker.io/linuxserver/sabnzbd
      nodeSelector: {}
      port:
        http: 8080
        https: 9090
    service:
      http:
        type: ClusterIP
        port: 8080
        nodePort:
        extraLBService: false
        extraLBAnnotations: {}
      https:
        type: ClusterIP
        port: 9090
        nodePort:
        extraLBService: false
        extraLBAnnotations: {}
    ingress:
      enabled: true
      annotations: {}
      path: /sabnzbd
      tls:
        enabled: false
        secretName: ""
    resources: {}
    volume: {}

  prowlarr:
    enabled: true
    container:
      image: docker.io/linuxserver/prowlarr
      tag: develop
      nodeSelector: {}
      port: 9696
    service:
      type: ClusterIP
      port: 9696
      nodePort:
      extraLBService: false
      extraLBAnnotations: {}
    ingress:
      enabled: true
      annotations: {}
      path: /prowlarr
      tls:
        enabled: false
        secretName: ""
    resources: {}
    volume: {}

  plex:
    enabled: false

  jellyfin:
    enabled: true
    replicaCount: 1
    container:
      image: docker.io/linuxserver/jellyfin
      nodeSelector: {}
      port: 8096
    service:
      type: ClusterIP
      port: 8096
      nodePort:
      extraLBService: false
      extraLBAnnotations: {}
    ingress:
      enabled: true
      annotations: {}
      path: /jellyfin
      tls:
        enabled: false
        secretName: ""
    resources:
      limits:
        cpu: 4000m
        memory: 4Gi
      requests:
        cpu: 3000m
        memory: 2Gi
    volume: {}
