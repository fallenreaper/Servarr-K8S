        metadata:
          labels:
            app: exportarr-radarr
        spec:
          containers:
            - name: exportarr
              image: ghcr.io/onedr0p/exportarr:latest
              args:
                - radarr
              env:
                - name: PORT
                  value: "9708"
                - name: URL
                  valueFrom:
                    configMapKeyRef:
                      name: exportarr-config
                      key: RADARR_URL
                - name: API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: exportarr-secrets
                      key: RADARR_API_KEY
              envFrom:
                - configMapRef:
                    name: exportarr-config
              ports:
                - containerPort: 9708
