apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Service
    metadata:
      name: exportarr-sonarr
      namespace: arr-exporter
      labels:
        app: exportarr
        app-name: sonarr
    spec:
      ports:
        - port: 9707
          targetPort: 9707
          protocol: TCP
          name: web
      selector:
        app: exportarr-sonarr
      type: ClusterIP
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: exportarr-sonarr
      namespace: arr-exporter
      labels:
        app: exportarr-sonarr
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: exportarr-sonarr
      template:
        metadata:
          labels:
            app: exportarr-sonarr
        spec:
          containers:
            - name: exportarr
              image: ghcr.io/onedr0p/exportarr:latest
              args:
                - sonarr
              env:
                - name: PORT
                  value: "9707"
                - name: URL
                  valueFrom:
                    configMapKeyRef:
                      name: exportarr-config
                      key: SONARR_URL
                - name: API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: exportarr-secrets
                      key: SONARR_API_KEY
              envFrom:
                - configMapRef:
                    name: exportarr-config
              ports:
                - containerPort: 9707
                  name: web
  - apiVersion: v1
    kind: Service
    metadata:
      name: exportarr-radarr
      namespace: arr-exporter
