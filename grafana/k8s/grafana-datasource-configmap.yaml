apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: arr-exporter
  labels:
    app: grafana
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.arr-exporter.svc.cluster.local:9090
        isDefault: true
